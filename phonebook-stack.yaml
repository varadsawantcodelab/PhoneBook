apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: varadsawantdockerlab/phonebook:postgres-17
        env:
        - name: POSTGRES_PASSWORD
          value: "Mypassword123" # 👈 Look at what this exact value is!
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_DB
          value: "phonebook_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonebook-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phonebook-backend
  template:
    metadata:
      labels:
        app: phonebook-backend
    spec:
      # Uncomment the lines below if your repo is PRIVATE
      # imagePullSecrets:
      # - name: dockerhub-secret
      containers:
      - name: backend
        image: varadsawantdockerlab/phonebook:backend
        imagePullPolicy: Always
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "Mypassword123" # 👈 Change this to match the Postgres password perfectly!
        - name: DB_DATABASE
          value: "phonebook_db"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        ports:
        - containerPort: 5000 # Change this to match your actual backend port
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: phonebook-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 32001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonebook-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phonebook-frontend
  template:
    metadata:
      labels:
        app: phonebook-frontend
    spec:
      # Uncomment the lines below if your repo is PRIVATE
      # imagePullSecrets:
      # - name: dockerhub-secret
      containers:
      - name: frontend
        image: varadsawantdockerlab/phonebook:frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 5173 # Change this to match your web server port (e.g. 80, 3000)
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: phonebook-frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
      nodePort: 32000 # Maps the frontend out to the KinD node